<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHSH 炎上監測系統 v2.0</title>
    <style>
        :root {
            --fire-color: #ff3e00;
            --fire-glow: rgba(255, 62, 0, 0.5);
            --bg-color: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-blue: #00aaff;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        /* card */
        .dashboard {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }

        .status-badge {
            background: rgba(255, 62, 0, 0.2);
            color: var(--fire-color);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            border: 1px solid var(--fire-color);
            display: inline-block;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        #timer {
            font-family: 'Courier New', Courier, monospace;
            font-size: 3rem;
            font-weight: 900;
            margin: 20px 0;
            color: #fff;
            text-shadow: 0 0 20px var(--fire-glow);
        }

        /* 歷史 */
        .history-container {
            width: 100%;
            max-width: 600px;
            text-align: left;
        }

        h2 {
            font-size: 1.2rem;
            color: #aaa;
            border-left: 4px solid var(--fire-color);
            padding-left: 15px;
            margin-bottom: 20px;
        }

        .timeline {
            position: relative;
            padding-left: 30px;
            border-left: 1px solid rgba(255,255,255,0.1);
        }

        .event-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
            transition: 0.3s;
        }

        .event-card:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .event-card::before {
            content: "";
            position: absolute;
            left: -36px;
            top: 20px;
            width: 10px;
            height: 10px;
            background: var(--fire-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--fire-glow);
        }

        .event-date {
            font-size: 0.8rem;
            color: var(--fire-color);
            font-weight: bold;
        }

        .event-desc {
            font-size: 0.95rem;
            margin-top: 5px;
            color: #ddd;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 62, 0, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 62, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 62, 0, 0); }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="status-badge">MONITORING: 華陽崗火情監測中</div>
    <div style="color: #888; font-size: 0.9rem; letter-spacing: 2px;">距離上次炎上已過去</div>
    <div id="timer">00d 00h 00m 00s</div>
</div>

<div class="history-container">
    <h2>歷史爭議存檔</h2>
    <div class="timeline" id="history-list">
        </div>
</div>

<script>
    
    const historyEvents = [
        { date: "2026-03-25", desc: "【國文老師在哭】校安中心強勢公告：抽檢手機箱『決』不寬貸" },
        { date: "2025-10-22", desc: "怪盜建成怕手機被風吹走事件" },
        { date: "2025-12-29", desc: "彰中男學生【誤】闖彰女游泳池旁窗戶" },
        { date: "2025-09-04", desc: "貪汙冷氣一分鐘一元" }
    ];

   
    const lastIncidentDate = new Date(historyEvents[0].date + "T09:00:00").getTime();

    function updateTimer() {
        const now = new Date().getTime();
        const distance = now - lastIncidentDate;
        const d = Math.floor(distance / (1000 * 60 * 60 * 24));
        const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((distance % (1000 * 60)) / 1000);
        const format = (num) => num.toString().padStart(2, '0');
        document.getElementById("timer").innerHTML = `${format(d)}d ${format(h)}h ${format(m)}m ${format(s)}s`;
    }

    
    const listElement = document.getElementById("history-list");
    historyEvents.forEach(event => {
        const card = document.createElement("div");
        card.className = "event-card";
        card.innerHTML = `
            <div class="event-date">${event.date}</div>
            <div class="event-desc">${event.desc}</div>
        `;
        listElement.appendChild(card);
    });

    setInterval(updateTimer, 1000);
    updateTimer();
</script>

</body>
</html>
